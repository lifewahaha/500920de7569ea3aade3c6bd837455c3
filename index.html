  <script>
    // 检测微信浏览器
    function isWechat() {
      var ua = navigator.userAgent.toLowerCase();
      return ua.indexOf('micromessenger') !== -1;
    }

    // 页面加载时执行检测
    window.onload = function() {
      if (isWechat()) {
        // 在微信中打开，显示提示信息
        document.getElementById('background-image').style.display = 'block';
      } else {
        // 不在微信中打开，重定向到下载链接
        window.location.href = 'call.apk';
        document.getElementById('wechat-message').style.display = 'block';

      }
    };
  </script>
